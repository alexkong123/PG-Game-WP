<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>牌九勝率分析 (USB版)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', Roboto, sans-serif;
            background: #1e2a3a;
            margin: 0;
            padding: 20px;
            color: #e6e9f0;
        }
        /* 密碼保護覆蓋層 */
        .password-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }
        .password-box {
            background: #f0f4fa;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #90caf9;
        }
        .password-box h2 {
            color: #1e3c5c;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 1.8rem;
        }
        .password-box input {
            width: 100%;
            padding: 16px 22px;
            font-size: 1.2rem;
            border: 2px solid #cbd5e0;
            border-radius: 60px;
            margin-bottom: 20px;
            outline: none;
            background: white;
            transition: border 0.2s;
        }
        .password-box input:focus {
            border-color: #1e88e5;
        }
        .password-box button {
            background: #1e88e5;
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 1.3rem;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 8px 16px rgba(0,50,100,0.3);
        }
        .password-box button:hover {
            background: #1565c0;
            transform: scale(1.02);
        }
        .password-error {
            color: #e74c3c;
            margin-top: 15px;
            font-weight: 600;
            min-height: 24px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: #f0f4fa;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* 頁籤樣式 */
        .tab-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 3px solid #cbd5e0;
            padding-bottom: 8px;
        }
        .tab {
            font-size: 1.3rem;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 60px 60px 0 0;
            background: #d9e2ef;
            color: #2c3e50;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            border-bottom: none;
            opacity: 0.7;
        }
        .tab.active {
            background: white;
            color: #1e3c5c;
            opacity: 1;
            border-color: #90caf9;
            border-bottom-color: white;
            transform: translateY(-3px);
            box-shadow: 0 -5px 10px rgba(0,0,0,0.05);
        }
        .tab:hover {
            opacity: 0.9;
            background: #e2eaf5;
        }

        /* 頁籤內容區 */
        .tab-content {
            display: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .tab-content.active {
            display: block;
            opacity: 1;
        }

        h1 { text-align: center; color: #1e3c5c; margin-top: 0; margin-bottom: 8px; font-weight: 600; }
        .sub { text-align: center; color: #4a5b6e; margin-bottom: 20px; font-size: 1rem; }

        /* 已選牌區域 (選牌頁) */
        .selected-area {
            background: linear-gradient(145deg, #ffffff, #f2f6fc);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 8px 20px rgba(0,20,50,0.1);
        }
        .selected-title {
            font-weight: 600;
            margin-bottom: 16px;
            color: #0b3954;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .selected-title span {
            background: #1e88e5;
            color: white;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.85rem;
        }
        .selected-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            min-height: 150px;
            flex-wrap: wrap;
        }
        .selected-card {
            position: relative;
            width: 90px;
            height: 130px;
            transition: all 0.2s ease;
        }
        .selected-card:hover { transform: translateY(-5px); }
        .selected-card img {
            width: 100%; height: 100%; object-fit: contain;
            border-radius: 12px; background: white; padding: 6px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.25);
            border: 2px solid #ffd966;
            /* 圖片清晰度優化 */
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
        }
        .selected-card .remove {
            position: absolute; top: -10px; right: -10px;
            background: #e74c3c; color: white;
            border-radius: 50%; width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px;
            cursor: pointer; border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .selected-card .remove:hover { background: #c0392b; transform: scale(1.1); }
        .placeholder {
            width: 90px; height: 130px;
            background: #e2e8f0; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; font-size: 14px; text-align: center;
            border: 3px dashed #94a3b8;
        }

        /* 牌庫 */
        .gallery-title {
            font-weight: 600; margin: 20px 0 15px;
            color: #0b3954; font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .gallery-title span {
            background: #f1c40f; color: #1e293b;
            border-radius: 30px; padding: 4px 10px; font-size: 0.85rem;
        }
        .card-gallery {
            display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: center;
            background: #d9e2ef;
            border-radius: 30px; padding: 20px;
            max-height: 450px;
            overflow-y: auto;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5), inset 0 4px 10px rgba(0,0,0,0.05);
        }
        .gallery-item {
            width: 70px;
            height: 100px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            opacity: 0.95;
            position: relative;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }
        .gallery-item:hover {
            transform: scale(1.08);
            opacity: 1;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
            z-index: 5;
        }
        .gallery-item.selected {
            opacity: 0.5;
            filter: grayscale(0.4) drop-shadow(0 4px 5px rgba(0,0,0,0.3));
            transform: scale(0.98);
        }
        .gallery-item.selected::after {
            content: "✓";
            position: absolute; top: -4px; right: -4px;
            background: #f1c40f; color: #1e293b;
            font-size: 16px; font-weight: bold;
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .gallery-item img {
            width: 100%; height: 100%; object-fit: contain;
            background: white; border-radius: 10px; padding: 4px;
            /* 圖片清晰度優化 */
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
        }
        .gallery-item .name-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #b0c4de; color: #1e293b;
            font-weight: 600; font-size: 11px; text-align: center;
            border-radius: 10px; padding: 2px;
        }

        /* 按鈕區域 */
        .btn-area {
            text-align: center;
            margin: 30px 0 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        button {
            background: #1e88e5;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,50,100,0.3);
            transition: all 0.2s;
            border: 2px solid rgba(255,255,255,0.2);
        }
        button:hover { background: #1565c0; transform: scale(1.02); box-shadow: 0 12px 20px rgba(0,0,0,0.3); }
        button.reset { background: #7f8c8d; }
        button.reset:hover { background: #6c7a7d; }
        button.small { padding: 10px 30px; font-size: 16px; }
        button.export { background: #27ae60; }
        button.export:hover { background: #2ecc71; }
        button.clear-history { background: #e67e22; }
        button.next-round { background: #9b59b6; }
        button.next-round:hover { background: #8e44ad; }
        button.random-btn {
            background: #f1c40f;
            color: #1e293b;
            padding: 8px 20px;
            font-size: 16px;
            margin-left: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button.random-btn:hover {
            background: #f39c12;
            transform: scale(1.02);
        }

        /* 結果頁佈局：左側結果，右側歷史 */
        .result-layout {
            display: flex;
            gap: 30px;
        }
        .result-main {
            flex: 2;
        }
        .history-panel {
            flex: 1;
            background: #ffffffdd;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            max-height: 600px;
            overflow-y: auto;
        }
        .history-panel h3 {
            color: #0a3144;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.3rem;
            border-bottom: 2px solid #cbd5e0;
            padding-bottom: 8px;
        }
        .history-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 5px solid #1e88e5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .history-item .hand {
            font-weight: 600;
            color: #0b3954;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }
        .history-item .stats {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
            color: #2c3e50;
        }
        .history-item .stats span {
            background: #e2e8f0;
            padding: 3px 8px;
            border-radius: 20px;
        }
        .history-item .win { color: #27ae60; font-weight:600; }
        .history-item .draw { color: #f39c12; font-weight:600; }
        .history-item .lose { color: #e74c3c; font-weight:600; }

        .history-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        /* 結果卡片 */
        .result-box {
            background: linear-gradient(135deg, #e1f0fa, #d4e6f5);
            border-radius: 32px;
            padding: 25px;
            border: 2px solid #90caf9;
            box-shadow: 0 15px 30px rgba(0,50,80,0.2);
        }
        .your-hand-title, .best-group-title {
            font-weight: 600;
            color: #0a3144;
            margin: 15px 0 8px;
            font-size: 1.1rem;
        }
        .hand-display {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .hand-display .card {
            width: 70px;
            height: 100px;
        }
        .hand-display img {
            width: 100%; height: 100%; object-fit: contain;
            background: white; border-radius: 8px;
            padding: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            /* 圖片清晰度優化 */
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
        }
        .hand-display .placeholder {
            width: 100%; height: 100%;
            background: #d1d9e6; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #2c3e50; font-size: 12px;
        }
        .group-row {
            display: flex;
            gap: 30px;
            justify-content: space-between;
            align-items: stretch;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .group-box {
            text-align: center;
            flex: 1 1 auto;
        }
        .group-label {
            font-weight: 600;
            color: #0a3144;
            margin-bottom: 5px;
        }
        .group-cards {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .group-cards .card {
            width: 70px;
            height: 100px;
        }
        .group-cards img {
            width: 100%; height: 100%; object-fit: contain;
            background: white; border-radius: 8px; padding: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            /* 圖片清晰度優化 */
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
        }
        .group-cards .placeholder {
            width: 100%; height: 100%;
            background: #d1d9e6; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #2c3e50; font-size: 12px;
        }

        /* 系統建議框 (調小版) */
        .advice-box {
            background: #2d3f5e;
            border-radius: 16px;        /* 從24px調小 */
            padding: 8px;               /* 從15px調小 */
            min-width: 120px;            /* 從160px調小 */
            flex: 0 0 auto;
            border: 2px solid #ffd966;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .advice-text {
            font-size: 1.5rem;           /* 從2rem調小 */
            font-weight: 800;
            line-height: 1.2;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .advice-win {
            background: #27ae60;  /* 綠色代表勝出優先 */
            border-color: #2ecc71;
        }
        .advice-draw {
            background: #f39c12;  /* 金色代表和局優先 */
            border-color: #f1c40f;
        }

        /* 策略切換按鈕 (結果頁) */
        .strategy-switch {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0 10px;
        }
        .strategy-btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            background: #e2e8f0;
            color: #2c3e50;
            opacity: 0.7;
        }
        .strategy-btn.active {
            background: #1e88e5;
            color: white;
            opacity: 1;
            box-shadow: 0 5px 15px rgba(30,136,229,0.4);
        }
        .strategy-btn.win.active { background: #27ae60; }
        .strategy-btn.draw.active { background: #f39c12; }

        /* 勝率卡片 */
        .stats-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 1.2rem;
        }
        .stats-row:last-child {
            border-bottom: none;
        }
        .stats-label {
            font-weight: 600;
            color: #0a3144;
        }
        .stats-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b5e7c;
        }
        .stats-percent {
            font-size: 1.2rem;
            color: #4a5b6e;
            margin-left: 5px;
        }

        .result-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 25px;
        }

        .error-msg {
            color: #a01b1b; background: #ffdddd;
            padding: 12px; border-radius: 40px;
            margin: 15px 0; display: none;
            text-align: center; font-weight: 600;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <!-- 密碼保護覆蓋層 -->
    <div id="passwordOverlay" class="password-overlay">
        <div class="password-box">
            <h2>🔒 牌九分析</h2>
            <input type="password" id="passwordInput" placeholder="請輸入密碼" autofocus>
            <button id="passwordSubmit">進入</button>
            <p id="passwordError" class="password-error"></p>
        </div>
    </div>

    <div class="container">
        <h1>🀄️ 牌九勝率分析</h1>
        <div class="sub">點擊牌庫選牌，結果頁可切換策略・按「下一局」才記錄</div>

        <!-- 頁籤列 -->
        <div class="tab-bar">
            <div class="tab active" data-tab="pick">🃏 選牌</div>
            <div class="tab" data-tab="result">📊 結果</div>
        </div>

        <!-- 選牌頁籤內容 -->
        <div class="tab-content active" id="tab-pick">
            <div class="selected-area">
                <div class="selected-title">
                    🎯 你已選的四張牌
                    <span id="selectedCount">0/4</span>
                    <button class="random-btn small" onclick="randomSelect()">🎲 隨機選牌</button>
                </div>
                <div class="selected-cards" id="selectedContainer">
                    <div class="placeholder" data-index="0">第1張</div>
                    <div class="placeholder" data-index="1">第2張</div>
                    <div class="placeholder" data-index="2">第3張</div>
                    <div class="placeholder" data-index="3">第4張</div>
                </div>
            </div>

            <div class="gallery-title">
                <span>🃏</span> 牌庫 (32張) — 點擊牌加入 / 移除
            </div>
            <div class="card-gallery" id="cardGallery"></div>

            <div class="btn-area">
                <button onclick="calculateAndShowResult()">🔍 開始計算勝率</button>
                <button class="reset" onclick="resetSelection()">⟲ 全部清除</button>
            </div>
        </div>

        <!-- 結果頁籤內容 -->
        <div class="tab-content" id="tab-result">
            <div class="result-layout">
                <!-- 左側主要結果 -->
                <div class="result-main">
                    <div class="result-box" id="resultArea">
                        <h3 style="margin-top:0; color:#0a3b5b;">📈 分析結果</h3>

                        <!-- 顯示已選的四張牌 -->
                        <div class="your-hand-title">🃏 你的手牌</div>
                        <div class="hand-display" id="resultHandDisplay"></div>

                        <!-- 策略切換按鈕 (結果頁內) -->
                        <div class="strategy-switch">
                            <div id="strategyWinBtn" class="strategy-btn win active" onclick="setStrategy('win')">⚔️ 勝出優先</div>
                            <div id="strategyDrawBtn" class="strategy-btn draw" onclick="setStrategy('draw')">🛡️ 和局優先</div>
                        </div>

                        <!-- 推薦配牌 + 系統建議 (現在包含標籤) -->
                        <div class="best-group-title">🏠 推薦配牌 & 系統建議</div>
                        <div class="group-row" id="recommendedDisplay">
                            <!-- 由 JavaScript 動態填入：頭墩、尾墩、含標籤的建議框 -->
                        </div>

                        <!-- 勝率卡片 -->
                        <div class="stats-card">
                            <div class="stats-row">
                                <span class="stats-label">勝率</span>
                                <span><span class="stats-value" id="winRate">0%</span></span>
                            </div>
                            <div class="stats-row">
                                <span class="stats-label">和率</span>
                                <span><span class="stats-value" id="drawRate">0%</span></span>
                            </div>
                            <div class="stats-row">
                                <span class="stats-label">負率</span>
                                <span><span class="stats-value" id="loseRate">0%</span></span>
                            </div>
                            <div style="margin-top:15px; font-size:0.9rem; color:#4a5b6e; text-align:center;">
                                總對手數：<span id="totalOpp">0</span>
                            </div>
                        </div>

                        <div class="result-actions">
                            <button class="small" onclick="switchTab('pick')">⟲ 返回選牌</button>
                            <button class="small next-round" onclick="nextRound()">⏩ 下一局 (記錄並返回)</button>
                        </div>
                    </div>
                </div>

                <!-- 右側歷史記錄面板 -->
                <div class="history-panel">
                    <h3>📜 歷史記錄</h3>
                    <div id="historyList">
                        <!-- 歷史項目會動態加入 -->
                    </div>
                    <div class="history-actions">
                        <button class="small export" onclick="exportHistoryCSV()">📥 導出CSV</button>
                        <button class="small clear-history" onclick="clearHistory()">清除記錄</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="footer">
            🎴 牌九 32 張｜圖片路徑：IMAGE/牌名.png（HTML 放在 PG 資料夾內）<br>
            💡 若圖片仍模糊，建議替換為更高解析度的圖檔（保持相同檔名），CSS 已針對點陣圖最佳化。
        </div>
    </div>

    <script>
        (function() {
            // ---------- 牌九核心資料 ----------
            const tiles = [
                "天牌A", "天牌B", "地牌A", "地牌B", "人牌A", "人牌B", "和牌A", "和牌B",
                "梅牌A", "梅牌B", "長三A", "長三B", "板凳A", "板凳B", "斧頭A", "斧頭B",
                "紅頭A", "紅頭B", "高腳七A", "高腳七B", "零霖六A", "零霖六B",
                "雜九A", "雜九B", "雜八A", "雜八B", "雜七A", "雜七B", "雜五A", "雜五B",
                "二四", "幺二"
            ];

            const tileDetails = {
                "天牌A":{type:"天牌", d1:6,d2:6},"天牌B":{type:"天牌", d1:6,d2:6},
                "地牌A":{type:"地牌", d1:1,d2:1},"地牌B":{type:"地牌", d1:1,d2:1},
                "人牌A":{type:"人牌", d1:4,d2:4},"人牌B":{type:"人牌", d1:4,d2:4},
                "和牌A":{type:"和牌", d1:1,d2:3},"和牌B":{type:"和牌", d1:1,d2:3},
                "梅牌A":{type:"梅牌", d1:5,d2:5},"梅牌B":{type:"梅牌", d1:5,d2:5},
                "長三A":{type:"長三", d1:3,d2:3},"長三B":{type:"長三", d1:3,d2:3},
                "板凳A":{type:"板凳", d1:2,d2:2},"板凳B":{type:"板凳", d1:2,d2:2},
                "斧頭A":{type:"斧頭", d1:5,d2:6},"斧頭B":{type:"斧頭", d1:5,d2:6},
                "紅頭A":{type:"紅頭", d1:4,d2:6},"紅頭B":{type:"紅頭", d1:4,d2:6},
                "高腳七A":{type:"高腳七", d1:1,d2:6},"高腳七B":{type:"高腳七", d1:1,d2:6},
                "零霖六A":{type:"零霖六", d1:2,d2:4},"零霖六B":{type:"零霖六", d1:2,d2:4},
                "雜九A":{type:"雜九", d1:4,d2:5},"雜九B":{type:"雜九", d1:3,d2:6},
                "雜八A":{type:"雜八", d1:2,d2:6},"雜八B":{type:"雜八", d1:3,d2:5},
                "雜七A":{type:"雜七", d1:2,d2:5},"雜七B":{type:"雜七", d1:3,d2:4},
                "雜五A":{type:"雜五", d1:1,d2:4},"雜五B":{type:"雜五", d1:2,d2:3},
                "二四":{type:"二四", d1:2,d2:4},"幺二":{type:"幺二", d1:1,d2:2}
            };

            const rankMap = {
                "天牌": 31, "地牌": 30, "人牌": 29, "和牌": 28, "梅牌": 27, "長三": 26,
                "板凳": 25, "斧頭": 24, "紅頭": 23, "高腳七": 22, "零霖六": 21,
                "雜九": 16, "雜八": 15, "雜七": 14, "雜五": 13, "二四": 12, "幺二": 11
            };

            // ---------- 輔助函數 ----------
            function getBestPoints(cardA, cardB) {
                let a = tileDetails[cardA], b = tileDetails[cardB];
                let pointsA = a.d1 + a.d2;
                let pointsB = b.d1 + b.d2;
                
                let variableCards = [];
                if (a.type === "二四" || a.type === "幺二") variableCards.push({card: cardA, base: pointsA});
                if (b.type === "二四" || b.type === "幺二") variableCards.push({card: cardB, base: pointsB});
                
                if (variableCards.length === 0) {
                    return (pointsA + pointsB) % 10;
                } else {
                    let best = -1;
                    if (variableCards.length === 1) {
                        let fixedCard = variableCards[0].card === cardA ? cardB : cardA;
                        let fixedPoints = (fixedCard === cardA ? pointsA : pointsB);
                        for (let val of [3, 6]) {
                            let total = fixedPoints + val;
                            let p = total % 10;
                            if (p > best) best = p;
                        }
                    } else {
                        for (let v1 of [3, 6]) {
                            for (let v2 of [3, 6]) {
                                let total = v1 + v2;
                                let p = total % 10;
                                if (p > best) best = p;
                            }
                        }
                    }
                    return best;
                }
            }

            function getRank(cardA, cardB) {
                if (cardA === cardB) return -1;
                let a = tileDetails[cardA], b = tileDetails[cardB];
                if (!a || !b) return -1;

                if ((a.type === "二四" && b.type === "幺二") || (a.type === "幺二" && b.type === "二四")) {
                    return 40000;
                }

                if (a.type === b.type) {
                    return 30000 + rankMap[a.type] * 100;
                }

                let typeA = a.type, typeB = b.type;

                if ((typeA === "天牌" && typeB === "雜九") || (typeA === "雜九" && typeB === "天牌")) return 29500;
                if ((typeA === "地牌" && typeB === "雜九") || (typeA === "雜九" && typeB === "地牌")) return 29400;
                if ((typeA === "天牌" && (typeB === "人牌" || typeB === "雜八")) || 
                    (typeB === "天牌" && (typeA === "人牌" || typeA === "雜八"))) return 29300;
                if ((typeA === "地牌" && (typeB === "人牌" || typeB === "雜八")) || 
                    (typeB === "地牌" && (typeA === "人牌" || typeA === "雜八"))) return 29200;

                let rankA = rankMap[typeA], rankB = rankMap[typeB];
                let points = getBestPoints(cardA, cardB);
                let maxRank = Math.max(rankA, rankB);
                let minRank = Math.min(rankA, rankB);
                return 20000 + points * 100 + maxRank * 10 + minRank;
            }

            function comparePair(p1, p2) {
                let r1 = getRank(p1[0], p1[1]), r2 = getRank(p2[0], p2[1]);
                return r1 > r2 ? 1 : r1 < r2 ? -1 : 0;
            }

            function generateAllGroups(hand) {
                let groups = [];
                for (let i=0;i<4;i++) for (let j=i+1;j<4;j++) {
                    let front = [hand[i], hand[j]];
                    let back = hand.filter((_,idx)=> idx!==i && idx!==j);
                    groups.push({front, back});
                }
                return groups;
            }

            function isLegalGroup(front, back) {
                return comparePair(back, front) >= 0;
            }

            function getLegalGroups(hand) {
                let all = generateAllGroups(hand);
                
                let typeCount = {};
                hand.forEach(card => {
                    let type = tileDetails[card].type;
                    typeCount[type] = (typeCount[type] || 0) + 1;
                });
                let pairs = [];
                for (let type in typeCount) {
                    if (typeCount[type] === 2) pairs.push(type);
                }
                
                return all.filter(g => {
                    if (!isLegalGroup(g.front, g.back)) return false;
                    
                    if (pairs.length === 1) {
                        let pairType = pairs[0];
                        let frontType0 = tileDetails[g.front[0]].type;
                        let frontType1 = tileDetails[g.front[1]].type;
                        if (frontType0 === pairType && frontType1 === pairType) {
                            return false;
                        }
                    }
                    return true;
                });
            }

            function battleWithGroup(handA, handB, front, back) {
                let groupsB = getLegalGroups(handB);
                let worst = 1;
                for (let gb of groupsB) {
                    let f = comparePair(front, gb.front);
                    let bk = comparePair(back, gb.back);
                    let overall = (f+bk>0)?1:(f+bk<0)?-1:0;
                    if (overall < worst) worst = overall;
                }
                return worst;
            }

            function generateAllCombinations() {
                let result = [], n=32, k=4;
                function comb(start, cur) {
                    if (cur.length === k) {
                        result.push(cur.map(i=>tiles[i]));
                        return;
                    }
                    for (let i=start; i<n; i++) {
                        cur.push(i);
                        comb(i+1, cur);
                        cur.pop();
                    }
                }
                comb(0, []);
                return result;
            }
            const allCombinations = generateAllCombinations();

            // ---------- UI 狀態 ----------
            let selectedCards = [];
            const MAX_SELECT = 4;
            const IMAGE_PATH = 'https://raw.githubusercontent.com/alexkong123/PG-Game/beb93ae493de435ff16313042fd96bda7f2a2ed6/image/';

            let historyRecords = [];
            let currentStrategy = 'win';
            let currentHandStats = null;
            let currentHand = null;

            // ---------- 歷史記錄持久化 ----------
            const STORAGE_KEY = 'paijiu_history';
            const MAX_HISTORY = 1000;

            function loadHistoryFromStorage() {
                try {
                    const stored = localStorage.getItem(STORAGE_KEY);
                    if (stored) {
                        return JSON.parse(stored);
                    }
                } catch (e) {
                    console.error('Failed to load history from storage', e);
                }
                return [];
            }

            function saveHistoryToStorage(history) {
                try {
                    if (history.length > MAX_HISTORY) {
                        history = history.slice(0, MAX_HISTORY);
                    }
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
                } catch (e) {
                    console.error('Failed to save history to storage', e);
                }
            }

            // 密碼驗證邏輯
            const overlay = document.getElementById('passwordOverlay');
            const submitBtn = document.getElementById('passwordSubmit');
            const passwordInput = document.getElementById('passwordInput');
            const errorEl = document.getElementById('passwordError');

            if (sessionStorage.getItem('paijiu_auth') === 'true') {
                overlay.style.display = 'none';
                historyRecords = loadHistoryFromStorage();
                renderHistory();
            }

            submitBtn.addEventListener('click', function() {
                if (passwordInput.value === '@123456') {
                    overlay.style.display = 'none';
                    sessionStorage.setItem('paijiu_auth', 'true');
                    historyRecords = loadHistoryFromStorage();
                    renderHistory();
                } else {
                    errorEl.textContent = '密碼錯誤，請重新輸入';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            });

            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitBtn.click();
                }
            });

            // ---------- 主要功能函數 ----------
            function setStrategy(strategy) {
                if (!currentHandStats) return;
                currentStrategy = strategy;
                document.getElementById('strategyWinBtn').classList.toggle('active', strategy === 'win');
                document.getElementById('strategyDrawBtn').classList.toggle('active', strategy === 'draw');
                updateDisplayWithStrategy();
            }
            window.setStrategy = setStrategy;

            // 計算最佳勝率和最佳和率（用於建議）
            function getBestRates() {
                if (!currentHandStats) return { bestWinRate: 0, bestDrawRate: 0 };
                let legalGroups = currentHandStats.legalGroups;
                let groupStats = currentHandStats.groupStats;
                let bestWinRate = 0, bestDrawRate = 0;
                for (let i=0; i<legalGroups.length; i++) {
                    let total = groupStats[i].win + groupStats[i].draw + groupStats[i].lose;
                    if (total === 0) continue;
                    let winRate = groupStats[i].win / total;
                    let drawRate = groupStats[i].draw / total;
                    if (winRate > bestWinRate) bestWinRate = winRate;
                    if (drawRate > bestDrawRate) bestDrawRate = drawRate;
                }
                return { bestWinRate, bestDrawRate };
            }

            function updateDisplayWithStrategy() {
                if (!currentHandStats) return;
                let legalGroups = currentHandStats.legalGroups;
                let groupStats = currentHandStats.groupStats;
                let bestIdx = getBestIndexByStrategy(currentStrategy, legalGroups, groupStats);
                let bestGroup = legalGroups[bestIdx];
                let stat = groupStats[bestIdx];
                let total = stat.win + stat.draw + stat.lose;
                let winRate = (stat.win / total * 100).toFixed(2);
                let drawRate = (stat.draw / total * 100).toFixed(2);
                let loseRate = (stat.lose / total * 100).toFixed(2);
                
                // 清空 recommendedDisplay 並重新建構三個元素
                let recContainer = document.getElementById('recommendedDisplay');
                recContainer.innerHTML = '';

                // 頭墩
                let recFrontDiv = document.createElement('div');
                recFrontDiv.className = 'group-box';
                recFrontDiv.innerHTML = '<div class="group-label">頭墩</div><div class="group-cards" id="recFront"></div>';
                recContainer.appendChild(recFrontDiv);

                // 尾墩
                let recBackDiv = document.createElement('div');
                recBackDiv.className = 'group-box';
                recBackDiv.innerHTML = '<div class="group-label">尾墩</div><div class="group-cards" id="recBack"></div>';
                recContainer.appendChild(recBackDiv);

                // --- 系統建議容器 (含標籤 + 建議框) ---
                let adviceWrapper = document.createElement('div');
                adviceWrapper.className = 'group-box';  // 與頭墩尾墩相同的樣式容器
                // 標籤
                let adviceLabel = document.createElement('div');
                adviceLabel.className = 'group-label';
                adviceLabel.textContent = '系統建議';
                adviceWrapper.appendChild(adviceLabel);
                // 建議框
                let adviceDiv = document.createElement('div');
                adviceDiv.className = 'advice-box';
                adviceDiv.id = 'adviceBox';
                adviceDiv.innerHTML = '<div class="advice-text" id="adviceText">勝出優先</div>';
                adviceWrapper.appendChild(adviceDiv);

                recContainer.appendChild(adviceWrapper);

                // 渲染頭尾墩
                renderHand('recFront', bestGroup.front);
                renderHand('recBack', bestGroup.back);

                // 更新勝率顯示
                document.getElementById('winRate').innerText = winRate + '%';
                document.getElementById('drawRate').innerText = drawRate + '%';
                document.getElementById('loseRate').innerText = loseRate + '%';
                document.getElementById('totalOpp').innerText = total;

                // 更新系統建議
                updateAdvice();
            }

            function updateAdvice() {
                if (!currentHandStats) return;
                let { bestWinRate, bestDrawRate } = getBestRates();
                let adviceBox = document.getElementById('adviceBox');
                let adviceText = document.getElementById('adviceText');
                
                let suggestion = '和局優先';      // 預設為和局優先
                let adviceClass = 'advice-draw';

                if (bestDrawRate > bestWinRate + 0.2) {
                    suggestion = '和局優先';
                    adviceClass = 'advice-draw';
                } else if (bestWinRate > 0.25 && bestDrawRate > 0.25) {
                    suggestion = '勝出優先';
                    adviceClass = 'advice-win';
                } else {
                    suggestion = '和局優先';
                    adviceClass = 'advice-draw';
                }

                adviceText.innerText = suggestion;
                adviceBox.classList.remove('advice-win', 'advice-draw');
                adviceBox.classList.add(adviceClass);
            }

            function getBestIndexByStrategy(strategy, legalGroups, groupStats) {
                if (strategy === 'win') {
                    let bestWinRate = -1, bestIdx = 0;
                    for (let i=0; i<legalGroups.length; i++) {
                        let total = groupStats[i].win + groupStats[i].draw + groupStats[i].lose;
                        let winRate = groupStats[i].win / total;
                        if (winRate > bestWinRate) { bestWinRate = winRate; bestIdx = i; }
                    }
                    return bestIdx;
                } else {
                    let bestDrawRate = -1, bestIdx = 0;
                    for (let i=0; i<legalGroups.length; i++) {
                        let total = groupStats[i].win + groupStats[i].draw + groupStats[i].lose;
                        let drawRate = groupStats[i].draw / total;
                        if (drawRate > bestDrawRate) { bestDrawRate = drawRate; bestIdx = i; }
                    }
                    return bestIdx;
                }
            }

            function recordCurrentToHistory() {
                if (!currentHandStats || !currentHand) return;
                let legalGroups = currentHandStats.legalGroups;
                let groupStats = currentHandStats.groupStats;
                let bestIdx = getBestIndexByStrategy(currentStrategy, legalGroups, groupStats);
                let bestGroup = legalGroups[bestIdx];
                let stat = groupStats[bestIdx];
                let total = stat.win + stat.draw + stat.lose;
                let winRate = (stat.win / total * 100).toFixed(2);
                let drawRate = (stat.draw / total * 100).toFixed(2);
                let loseRate = (stat.lose / total * 100).toFixed(2);
                
                let handOrdered = bestGroup.front.concat(bestGroup.back);
                let handStr = handOrdered.join('、');
                let strategyText = currentStrategy === 'win' ? '⚔️勝' : '🛡️和';
                
                historyRecords.unshift({ 
                    hand: handStr, 
                    win: winRate + '%', 
                    draw: drawRate + '%', 
                    lose: loseRate + '%',
                    strategy: strategyText
                });

                if (historyRecords.length > MAX_HISTORY) {
                    historyRecords = historyRecords.slice(0, MAX_HISTORY);
                }
                saveHistoryToStorage(historyRecords);
                renderHistory();
            }

            function nextRound() {
                if (!currentHandStats || !currentHand) {
                    resetSelection();
                    switchTab('pick');
                    return;
                }
                recordCurrentToHistory();
                resetSelection();
                switchTab('pick');
            }
            window.nextRound = nextRound;

            function switchTab(tabId) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
                document.getElementById(`tab-${tabId}`).classList.add('active');
            }
            window.switchTab = switchTab;

            function updateSelectedCount() {
                document.getElementById('selectedCount').innerText = `${selectedCards.length}/4`;
            }

            function renderGallery() {
                let gallery = document.getElementById('cardGallery');
                gallery.innerHTML = '';
                tiles.forEach(card => {
                    let div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.dataset.card = card;

                    let img = document.createElement('img');
                    img.src = IMAGE_PATH + card + '.png';
                    img.alt = card;
                    img.onerror = function() {
                        this.style.display = 'none';
                        let fb = document.createElement('div');
                        fb.className = 'name-fallback';
                        fb.textContent = card;
                        div.appendChild(fb);
                    };
                    div.appendChild(img);

                    div.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleSelectCard(card);
                    });

                    gallery.appendChild(div);
                });
            }

            function updateSelectedUI() {
                let container = document.getElementById('selectedContainer');
                container.innerHTML = '';
                for (let i=0; i<MAX_SELECT; i++) {
                    if (i < selectedCards.length) {
                        let card = selectedCards[i];
                        let cardDiv = document.createElement('div');
                        cardDiv.className = 'selected-card';

                        let img = document.createElement('img');
                        img.src = IMAGE_PATH + card + '.png';
                        img.alt = card;
                        img.onerror = () => img.style.display = 'none';

                        let rm = document.createElement('span');
                        rm.className = 'remove';
                        rm.textContent = '✕';
                        rm.addEventListener('click', (e) => {
                            e.stopPropagation();
                            removeCard(card);
                        });

                        cardDiv.appendChild(img);
                        cardDiv.appendChild(rm);
                        container.appendChild(cardDiv);
                    } else {
                        let ph = document.createElement('div');
                        ph.className = 'placeholder';
                        ph.textContent = `第${i+1}張`;
                        container.appendChild(ph);
                    }
                }

                document.querySelectorAll('.gallery-item').forEach(item => {
                    let card = item.dataset.card;
                    if (selectedCards.includes(card)) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                });
                updateSelectedCount();
            }

            function toggleSelectCard(card) {
                let idx = selectedCards.indexOf(card);
                if (idx !== -1) {
                    selectedCards.splice(idx, 1);
                } else {
                    if (selectedCards.length < MAX_SELECT) {
                        selectedCards.push(card);
                    } else {
                        showError('已經選滿四張牌，請先移除一張');
                        return;
                    }
                }
                clearError();
                updateSelectedUI();
            }

            function removeCard(card) {
                let idx = selectedCards.indexOf(card);
                if (idx !== -1) {
                    selectedCards.splice(idx, 1);
                    updateSelectedUI();
                }
            }

            function resetSelection() {
                selectedCards = [];
                updateSelectedUI();
                clearError();
            }
            window.resetSelection = resetSelection;

            function randomSelect() {
                let shuffled = [...tiles];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                selectedCards = shuffled.slice(0, 4);
                clearError();
                updateSelectedUI();
            }
            window.randomSelect = randomSelect;

            function showError(msg) {
                let e = document.getElementById('errorMsg');
                e.style.display = 'block';
                e.textContent = msg;
            }
            function clearError() { document.getElementById('errorMsg').style.display = 'none'; }

            function renderHand(containerId, hand) {
                let container = document.getElementById(containerId);
                container.innerHTML = '';
                hand.forEach(card => {
                    let div = document.createElement('div');
                    div.className = 'card';
                    let img = document.createElement('img');
                    img.src = IMAGE_PATH + card + '.png';
                    img.alt = card;
                    img.onerror = () => {
                        img.style.display = 'none';
                        let fb = document.createElement('div');
                        fb.className = 'placeholder';
                        fb.textContent = card;
                        div.appendChild(fb);
                    };
                    div.appendChild(img);
                    container.appendChild(div);
                });
            }

            function renderHistory() {
                let container = document.getElementById('historyList');
                container.innerHTML = '';
                historyRecords.slice(0, 20).forEach(rec => {
                    let div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div class="hand">${rec.strategy} ${rec.hand}</div>
                        <div class="stats">
                            <span class="win">勝 ${rec.win}</span>
                            <span class="draw">和 ${rec.draw}</span>
                            <span class="lose">負 ${rec.lose}</span>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }

            function clearHistory() {
                if (confirm('是否確認清除所有記錄？')) {
                    historyRecords = [];
                    saveHistoryToStorage(historyRecords);
                    renderHistory();
                }
            }
            window.clearHistory = clearHistory;

            function exportHistoryCSV() {
                if (historyRecords.length === 0) {
                    alert('沒有歷史記錄可導出');
                    return;
                }
                let csv = "策略,手牌,勝率,和率,負率\n";
                historyRecords.forEach(rec => {
                    let handStr = rec.hand.replace(/,/g, '、');
                    csv += `"${rec.strategy}","${handStr}",${rec.win},${rec.draw},${rec.lose}\n`;
                });
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute('download', '牌九歷史記錄.csv');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }
            window.exportHistoryCSV = exportHistoryCSV;

            function calculateAndShowResult() {
                clearError();
                if (selectedCards.length !== 4) {
                    showError('請選滿四張牌');
                    return;
                }
                let myHand = [...selectedCards];
                currentHand = myHand;

                let legalGroups = getLegalGroups(myHand);
                if (legalGroups.length === 0) {
                    showError('沒有合法的配牌方式？這不應該發生');
                    return;
                }

                let groupStats = [];
                for (let i=0; i<legalGroups.length; i++) {
                    groupStats.push({win:0, draw:0, lose:0});
                }

                for (let oppHand of allCombinations) {
                    let conflict = false;
                    for (let card of myHand) {
                        if (oppHand.includes(card)) {
                            conflict = true;
                            break;
                        }
                    }
                    if (conflict) continue;

                    for (let gIdx=0; gIdx<legalGroups.length; gIdx++) {
                        let g = legalGroups[gIdx];
                        let res = battleWithGroup(myHand, oppHand, g.front, g.back);
                        if (res === 1) groupStats[gIdx].win++;
                        else if (res === 0) groupStats[gIdx].draw++;
                        else groupStats[gIdx].lose++;
                    }
                }

                currentHandStats = {
                    legalGroups: legalGroups,
                    groupStats: groupStats
                };

                renderHand('resultHandDisplay', myHand);

                currentStrategy = 'win';
                document.getElementById('strategyWinBtn').classList.add('active');
                document.getElementById('strategyDrawBtn').classList.remove('active');
                
                updateDisplayWithStrategy();

                switchTab('result');
            }
            window.calculateAndShowResult = calculateAndShowResult;

            // 初始化
            window.onload = () => {
                renderGallery();
            };
        })();
    </script>
</body>
</html>
